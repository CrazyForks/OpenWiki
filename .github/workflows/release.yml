name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Apple Silicon)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenWiki ${{ github.ref_name }}'
          releaseBody: |
            OpenWiki ${{ github.ref_name }} 发布！

            ## 安装说明（macOS）
            1. 下载 `.dmg` 文件
            2. 打开 DMG，将 OpenWiki 拖入 Applications 文件夹
            3. 首次打开时，如果提示"无法验证开发者"：
               - 打开 **系统设置 → 隐私与安全性**
               - 找到 OpenWiki 的提示，点击 **仍要打开**
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin

      - name: Build Tauri app (Intel)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenWiki ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: --target x86_64-apple-darwin
