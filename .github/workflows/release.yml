name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Read per-version release notes from release-notes/<tag>.md.
      # Claude maintains this file (see release-notes/README.md); if it's
      # missing we fall back to a minimal generic body so the release still
      # publishes successfully.
      - name: Prepare release body
        id: release_body
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          NOTES_FILE="release-notes/${TAG}.md"
          EOF_MARKER="RELEASE_BODY_EOF_$(date +%s%N)"
          {
            echo "body<<${EOF_MARKER}"
            if [ -f "$NOTES_FILE" ]; then
              cat "$NOTES_FILE"
            else
              echo "OpenWiki ${TAG} Released!"
              echo ""
              echo "See the repository for details."
            fi
            echo "${EOF_MARKER}"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app (Apple Silicon)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenWiki ${{ github.ref_name }}'
          releaseBody: ${{ steps.release_body.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin

      - name: Build Tauri app (Intel)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenWiki ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: --target x86_64-apple-darwin
